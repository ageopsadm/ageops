<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<title>Leitura Planilha 2026</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:monospace;background:#080c14;color:#adc;padding:20px;font-size:11px}
#log{background:#000;padding:14px;border:1px solid #1a2a3a;border-radius:6px;max-height:90vh;overflow-y:auto}
pre{white-space:pre-wrap;word-break:break-all;margin:1px 0}
.ok{color:#00ff88}.warn{color:#ffcc00}.info{color:#00aaff}.dim{color:#445566}.err{color:#ff4444}
</style>
</head>
<body>
<div id="log"><pre class="dim">Carregando 2026.xlsx...</pre></div>
<script>
var el = document.getElementById('log');
function L(t,c){var p=document.createElement('pre');p.className=c||'dim';p.textContent=typeof t==='object'?JSON.stringify(t,null,2):String(t);el.appendChild(p);el.scrollTop=el.scrollHeight;}

function fmtDate(raw){
  if(!raw)return'';
  if(raw instanceof Date){var y=raw.getUTCFullYear(),m=raw.getUTCMonth()+1,d=raw.getUTCDate();if(y>1900)return y+'-'+('0'+m).slice(-2)+'-'+('0'+d).slice(-2);}
  var s=raw.toString().trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s.substring(0,10);
  var months={jan:1,feb:2,fev:2,mar:3,apr:4,abr:4,may:5,mai:5,jun:6,jul:7,aug:8,ago:8,sep:9,set:9,oct:10,out:10,nov:11,dec:12,dez:12};
  var m=s.match(/(\d{1,2})[-\/\s]([a-zA-Z]+)[-\/\s](\d{4})/);
  if(m){var mo=months[m[2].toLowerCase().substring(0,3)];if(mo)return m[3]+'-'+('0'+mo).slice(-2)+'-'+('0'+m[1]).slice(-2);}
  if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(s)){var p=s.split(/[\/\-]/);return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');}
  return'';
}
function getNum(rN,rS,i){
  if(i<0)return 0;
  var nv=rN[i];
  if(typeof nv==='number'&&!isNaN(nv))return nv;
  var sv=(rS[i]||'').toString().trim().replace(/R\$\s*/gi,'').replace(/\s+/g,'');
  if(/^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(sv))sv=sv.replace(/,/g,'');
  else if(/^-?\d{1,3}(\.\d{3})*(,\d+)?$/.test(sv))sv=sv.replace(/\./g,'').replace(',','.');
  else sv=sv.replace(/[^\d.\-]/g,'');
  var n=parseFloat(sv);return isNaN(n)?0:n;
}

window.addEventListener('load', async function(){
  try {
    var resp = await fetch('2026.xlsx');
    if(!resp.ok){L('ERRO: '+resp.status,'err');return;}
    var buf  = await resp.arrayBuffer();
    var wb   = XLSX.read(buf,{type:'array',cellDates:true});
    L('Sheets: '+wb.SheetNames.join(', '),'info');
    
    var ws   = wb.Sheets[wb.SheetNames[0]];
    var rowsS= XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    var rowsN= XLSX.utils.sheet_to_json(ws,{header:1,raw:true, defval:null});
    
    // Mostrar primeiras 8 linhas
    L('\n── PRIMEIRAS 8 LINHAS CRUAS ──','warn');
    rowsS.slice(0,8).forEach(function(r,i){L('  ['+i+'] '+JSON.stringify(r),'dim');});
    
    // Encontrar header
    var hr=0;
    for(var i=0;i<Math.min(10,rowsS.length);i++){
      if((rowsS[i]||[]).join(' ').toLowerCase().indexOf('cliente')>=0){hr=i;break;}
    }
    var headers=(rowsS[hr]||[]).map(function(h){return(h||'').toString().trim();});
    L('\nHeader row='+hr+': '+JSON.stringify(headers),'ok');
    
    // Mapear colunas
    var ci={client:-1,project:-1,sale_date:-1,pay_date:-1,month:-1,new_client:-1,value:-1,cost:-1,profit:-1,margin:-1,nps:-1,category:-1,segment:-1};
    headers.forEach(function(orig,i){
      var h=orig.toLowerCase().trim();
      if(/^(cliente|clientes)$/.test(h)&&ci.client===-1)ci.client=i;
      if(/^projeto/.test(h)&&ci.project===-1)ci.project=i;
      if(/data.*venda|venda.*data/.test(h))ci.sale_date=i;
      if(/data.*pag|pag.*data/.test(h))ci.pay_date=i;
      if(/^m[eê]s$/.test(h))ci.month=i;
      if(/cliente.*novo/.test(h)&&ci.new_client===-1)ci.new_client=i;
      if(/^nps$/.test(h))ci.nps=i;
      if(/categ/.test(h)&&ci.category===-1)ci.category=i;
      if(/segmen/.test(h)&&ci.segment===-1)ci.segment=i;
      if(/^faturamento$|^or[cç]amento$|^receita$/.test(h))ci.value=i;
      if(h==='valor'&&ci.value===-1)ci.value=i;
      if(/valor.*total/i.test(h)&&ci.value===-1)ci.value=i;
      if(/^(custos?|despesas?|gastos?)$/.test(h)&&ci.cost===-1)ci.cost=i;
      if(/custo.*(prod|total|real|var)/i.test(h)&&ci.cost===-1)ci.cost=i;
      if(/^lucro$/.test(h)&&ci.profit===-1)ci.profit=i;
      if(/^(margem|margin)$/.test(h)&&ci.margin===-1)ci.margin=i;
    });
    L('\nMapeamento: '+JSON.stringify(ci),'info');
    
    // Extrair projetos
    L('\n── TODOS OS PROJETOS ──','warn');
    var projs=[];
    for(var ri=hr+1;ri<rowsS.length;ri++){
      var rowS=rowsS[ri]||[],rowN=rowsN[ri]||[];
      if(rowS.every(function(c){return!c||c.toString().trim()===''}))continue;
      var client=ci.client>=0?(rowS[ci.client]||'').toString().trim():'';
      var proj=ci.project>=0?(rowS[ci.project]||'').toString().trim():'';
      if(!client&&!proj)continue;
      if(/^(total|soma|m[eê]dia|subtotal)/i.test(client))continue;
      var val=getNum(rowN,rowS,ci.value);
      var cost=getNum(rowN,rowS,ci.cost);
      var profit=getNum(rowN,rowS,ci.profit);
      var nps=getNum(rowN,rowS,ci.nps);
      var margin=getNum(rowN,rowS,ci.margin);
      if(margin>0&&margin<=1.5)margin=parseFloat((margin*100).toFixed(1));
      if(val>0&&profit===0&&cost>=0)profit=parseFloat((val-cost).toFixed(2));
      if(val>0&&profit!==0&&margin===0)margin=parseFloat(((profit/val)*100).toFixed(1));
      var payDate=fmtDate(ci.pay_date>=0?(rowN[ci.pay_date]||rowS[ci.pay_date]||''):'');
      var saleDate=fmtDate(ci.sale_date>=0?(rowN[ci.sale_date]||rowS[ci.sale_date]||''):'');
      var month=ci.month>=0?(parseInt(rowN[ci.month])||0):0;
      if(!month&&payDate&&payDate.length>=7)month=parseInt(payDate.substring(5,7));
      if(!month&&saleDate&&saleDate.length>=7)month=parseInt(saleDate.substring(5,7));
      var newCli=ci.new_client>=0?(rowS[ci.new_client]||'').toString().trim():'';
      var cat=ci.category>=0?(rowS[ci.category]||'').toString().trim():'';
      var seg=ci.segment>=0?(rowS[ci.segment]||'').toString().trim():'';
      var p={
        year:2026, month:month, client_name:client, project_name:proj,
        sale_date:saleDate, payment_date:payDate,
        is_new_client:/^(sim|yes|true|1)$/i.test(newCli),
        value:Math.round(val*100)/100, cost:Math.round(cost*100)/100,
        profit:Math.round(profit*100)/100,
        margin_pct:parseFloat(margin.toFixed(1)),
        nps:(nps>10||nps<0)?0:parseFloat(nps.toFixed(1)),
        category:cat||'producao', segment:seg||'', status:'concluido'
      };
      projs.push(p);
      L('  ['+ri+'] cliente="'+client+'" proj="'+proj+'" mes='+month+' val='+val+' cost='+cost+' sal='+saleDate+' pay='+payDate+' seg="'+seg+'" cat="'+cat+'" new='+newCli,'ok');
    }
    
    var totV=projs.reduce(function(s,p){return s+p.value;},0);
    var totC=projs.reduce(function(s,p){return s+p.cost;},0);
    L('\nTOTAL: '+projs.length+' projetos | Fat: R$'+Math.round(totV).toLocaleString('pt-BR')+' | Custo: R$'+Math.round(totC).toLocaleString('pt-BR')+' (esperado: R$46.200 / R$19.979)',projs.length===12&&Math.abs(totV-46200)<50?'ok':'warn');
    
    // Salvar JSON para usar
    window._proj2026 = projs;
    L('\nJSON dos projetos salvo em window._proj2026','info');
    L(JSON.stringify(projs, null, 2),'dim');
    
  } catch(e){L('ERRO: '+e.message,'err');console.error(e);}
});
</script>
</body>
</html>
