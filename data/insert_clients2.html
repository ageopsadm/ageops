async function run(){
  // First clear existing
  log('Clearing existing clients...');
  var page=1,hasMore=true,deleted=0;
  while(hasMore){
    var r=await fetch('../tables/age_clients_db?page='+page+'&limit=100');
    var d=await r.json();
    var items=(d.data||[]).filter(function(x){return !x.deleted;});
    if(items.length===0){hasMore=(d.data||[]).length>=100;page++;continue;}
    await Promise.all(items.map(function(x){return fetch('../tables/age_clients_db/'+x.id,{method:'DELETE'}).then(function(){deleted++;});}));
    if((d.data||[]).length<100) hasMore=false;
    else page++;
  }
  log('Cleared: '+deleted);

  // Insert in batches of 5
  var inserted=0,errors=0;
  for(var i=0;i<CLIENTS.length;i+=5){
    var batch=CLIENTS.slice(i,i+5);
    await Promise.all(batch.map(function(c){
      return fetch('../tables/age_clients_db',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          client_name:c.name,
          first_year:c.first_year,
          last_year:c.last_year,
          total_projects:c.total_projects,
          total_value:c.total_value,
          avg_nps:c.avg_nps,
          status:c.status,
          notes:'',
          years_active:c.years_active
        })
      }).then(function(r){if(r.ok)inserted++;else errors++;}).catch(function(){errors++;});
    }));
  }
  
  log('DONE: inserted='+inserted+' errors='+errors+' total='+CLIENTS.length);
  console.log('RESULT:inserted='+inserted+'|errors='+errors);
}
