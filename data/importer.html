<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<title>AGE OPS ã XLSX Importer</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:monospace;background:#0a0a12;color:#0f0;padding:20px;font-size:12px;}
pre{white-space:pre-wrap;word-break:break-all;margin:0}
.ok{color:#0f0}.err{color:#f55}.warn{color:#ff0}.info{color:#0cf}
#log{background:#000;padding:14px;border:1px solid #333;border-radius:6px;max-height:70vh;overflow-y:auto;margin-top:14px;}
button{background:#111;color:#0f0;border:1px solid #0f0;padding:8px 18px;cursor:pointer;font-family:monospace;font-size:13px;margin:4px;border-radius:4px;}
button:hover{background:#0f0;color:#000;}
h1{color:#ff0;}
</style>
</head>
<body>
<h1>Þ AGE OPS ã XLSX ã DB Importer</h1>
<button onclick="runImport()">Þ IMPORTAR TODOS OS ANOS</button>
<button onclick="document.getElementById('log').innerHTML=''">ÞÏ¿ Limpar Log</button>
<div id="log"><pre>Aguardando...</pre></div>

<script>
var logEl=document.getElementById('log');
function addLog(msg,cls){
  var pre=document.createElement('pre');
  pre.className=cls||'';
  pre.textContent=msg;
  logEl.appendChild(pre);
  logEl.scrollTop=logEl.scrollHeight;
}

// Fix parseNum for US format: R$8,000.00 or 8,000.00 or 8000
function parseNum(v){
  if(v===undefined||v===null||v==='') return 0;
  if(typeof v==='number') return v;
  var s=v.toString().trim();
  // Remove currency symbols
  s=s.replace(/R\$\s*/gi,'').replace(/\$\s*/g,'').trim();
  // US format: 8,000.00 -> remove commas
  if(/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(s)){
    s=s.replace(/,/g,'');
  } else {
    // BR format: 8.000,00 -> remove dots, replace comma with dot  
    if(/^\d{1,3}(\.\d{3})*(,\d+)?$/.test(s)){
      s=s.replace(/\./g,'').replace(',','.');
    } else {
      // generic: remove all non-digit/dot/minus
      s=s.replace(/[^\d.\-]/g,'');
    }
  }
  // Remove trailing %
  s=s.replace('%','').trim();
  if(!s||s==='-') return 0;
  var n=parseFloat(s);
  return isNaN(n)?0:n;
}

function fmtDate(v){
  if(!v) return '';
  if(v instanceof Date){
    return v.getFullYear()+'-'+('0'+(v.getMonth()+1)).slice(-2)+'-'+('0'+v.getDate()).slice(-2);
  }
  var s=v.toString().trim();
  // Already ISO
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
  // JS Date string from cellDates:true
  if(s.indexOf('GMT')>=0||s.indexOf('UTC')>=0){
    var d=new Date(s);
    if(!isNaN(d)) return d.getUTCFullYear()+'-'+('0'+(d.getUTCMonth()+1)).slice(-2)+'-'+('0'+d.getUTCDate()).slice(-2);
  }
  var months={jan:1,feb:2,fev:2,mar:3,apr:4,abr:4,may:5,mai:5,jun:6,jul:7,aug:8,ago:8,sep:9,set:9,oct:10,out:10,nov:11,dec:12,dez:12};
  var m=s.match(/(\d{1,2})[-\/\s]([a-zA-Z]+)[-\/\s](\d{4})/);
  if(m){var mo=months[m[2].toLowerCase().substring(0,3)];if(mo)return m[3]+'-'+('0'+mo).slice(-2)+'-'+('0'+m[1]).slice(-2);}
  if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/.test(s)){var p=s.split(/[\/\-]/);return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');}
  return s;
}

async function parseXLSX(yr){
  var resp=await fetch(yr+'.xlsx');
  var buf=await resp.arrayBuffer();
  var wb=XLSX.read(buf,{type:'array',raw:false,cellDates:true});
  var sn=wb.SheetNames[0];
  var ws=wb.Sheets[sn];
  
  // raw:false with cellDates:true gives formatted strings for text, Date objects for dates, numbers for numbers
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
  var rowsN=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  
  // Find header row
  var hr=0;
  for(var i=0;i<Math.min(8,rows.length);i++){
    if((rows[i]||[]).join(' ').toLowerCase().indexOf('cliente')>=0){hr=i;break;}
  }
  
  var headers=(rows[hr]||[]).map(function(h){return (h||'').toString().trim();});
  addLog('['+yr+'] Headers: '+headers.map(function(h,i){return i+':'+h;}).join(', '),'info');
  
  var ci={client:-1,project:-1,sale_date:-1,pay_date:-1,month:-1,new_client:-1,value:-1,cost:-1,profit:-1,margin:-1,nps:-1,category:-1};
  headers.forEach(function(orig,i){
    var h=orig.toLowerCase().trim();
    if(/^(cliente|clientes)$/.test(h)&&ci.client===-1) ci.client=i;
    if(/^projeto/.test(h)&&ci.project===-1) ci.project=i;
    if(/data.*venda|venda.*data/.test(h)) ci.sale_date=i;
    if(/data.*pag|pag.*data/.test(h)) ci.pay_date=i;
    if(/^m[eûˆ]s$/.test(h)) ci.month=i;
    if(/cliente.*novo/.test(h)&&ci.new_client===-1) ci.new_client=i;
    if(/^nps$/.test(h)) ci.nps=i;
    if(/categ/.test(h)&&ci.category===-1) ci.category=i;
    if(/^faturamento$/.test(h)||/^or[cûÏ]amento$/.test(h)||/^receita$/.test(h)) ci.value=i;
    if(h==='valor'&&ci.value===-1) ci.value=i;
    if(/valor.*total/i.test(h)&&ci.value===-1) ci.value=i;
    if(/^(custos?|despesas?|gastos?)$/.test(h)&&ci.cost===-1) ci.cost=i;
    if(/custo.*(prod|total|real|var)/i.test(h)&&ci.cost===-1) ci.cost=i;
    if(/^lucro$/.test(h)&&ci.profit===-1) ci.profit=i;
    if(/lucro.*(liq|total)/i.test(h)&&ci.profit===-1) ci.profit=i;
    if(/^(margem|margin)$/.test(h)&&ci.margin===-1) ci.margin=i;
    if(/lucro.*%|marg.*%|^%$/.test(h)&&ci.margin===-1) ci.margin=i;
  });
  
  addLog('['+yr+'] ColMap: '+JSON.stringify(ci),'info');
  
  var projs=[];
  for(var ri=hr+1;ri<rows.length;ri++){
    var rowS=rows[ri]||[];
    var rowN=rowsN[ri]||[];
    if(rowS.every(function(c){return !c||c.toString().trim()==''})) continue;
    
    var client=ci.client>=0?(rowS[ci.client]||'').toString().trim():'';
    var proj=ci.project>=0?(rowS[ci.project]||'').toString().trim():'';
    if(!client&&!proj) continue;
    if(/^(total|soma|m[eûˆ]dia|subtotal|grand)/i.test(client)) continue;
    // Skip rows where "client" is a pure number (totals row)
    if(/^\d+$/.test(client.replace(/[,. ]/g,''))) continue;
    
    // Financial: use string representation for currency parsing (handles R$8,000.00 format)
    function getF(idx){
      if(idx<0) return 0;
      var sv=(rowS[idx]||'').toString();
      var pv=parseNum(sv);
      if(pv!==0) return pv;
      // fallback raw
      var nv=rowN[idx];
      if(typeof nv==='number') return nv;
      return 0;
    }
    
    var val=getF(ci.value);
    var cost=getF(ci.cost);
    var profit=getF(ci.profit);
    var rawM=getF(ci.margin);
    var nps=ci.nps>=0?parseNum((rowS[ci.nps]||'').toString()):0;
    
    // Margin normalization
    var margin=rawM;
    if(margin>0&&margin<=1.5) margin=parseFloat((margin*100).toFixed(1));
    else margin=parseFloat(margin.toFixed(1));
    
    // Derive missing
    if(val>0&&profit===0&&cost>=0) profit=parseFloat((val-cost).toFixed(2));
    if(val>0&&profit!==0&&margin===0) margin=parseFloat(((profit/val)*100).toFixed(1));
    
    // Dates
    var payDRaw=ci.pay_date>=0?(rowS[ci.pay_date]||rowN[ci.pay_date]||''):'';
    var saleDRaw=ci.sale_date>=0?(rowS[ci.sale_date]||rowN[ci.sale_date]||''):'';
    var monthRaw=ci.month>=0?(rowN[ci.month]||rowS[ci.month]||0):0;
    var month=parseInt(monthRaw)||0;
    if(!month){var pd=fmtDate(payDRaw.toString());if(pd&&pd.length>=7) month=parseInt(pd.substring(5,7));}
    
    var newCli=ci.new_client>=0?(rowS[ci.new_client]||'').toString().trim():'';
    
    projs.push({
      year:parseInt(yr),
      client:client,
      project_name:proj,
      sale_date:fmtDate(saleDRaw.toString()),
      pay_date:fmtDate(payDRaw.toString()),
      month:month||0,
      new_client:(/^(sim|yes|true|1)$/i.test(newCli))?'Sim':'Nao',
      value:Math.round(val*100)/100,
      cost:Math.round(cost*100)/100,
      profit:Math.round(profit*100)/100,
      margin:margin,
      nps:(nps>10||nps<0)?0:nps,
      category:ci.category>=0?(rowS[ci.category]||'').toString().trim()||'producao':'producao',
      status:'concluido',
      deleted:false
    });
  }
  
  return projs;
}

async function insertBatch(tableName, rows){
  var inserted=0;
  // Insert in batches of 10
  var batchSize=10;
  for(var i=0;i<rows.length;i+=batchSize){
    var batch=rows.slice(i,i+batchSize);
    var promises=batch.map(function(row){
      return fetch('../tables/'+tableName,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(row)
      }).then(function(r){if(r.ok)inserted++;return r;});
    });
    await Promise.all(promises);
    addLog('  Inserindo '+Math.min(i+batchSize,rows.length)+'/'+rows.length+'...','');
  }
  return inserted;
}

async function runImport(){
  addLog('=== INICIANDO IMPORTAûûO ===','ok');
  
  var years=['2021','2022','2023','2024','2025','2026'];
  var grandTotal={projs:0,fat:0,custo:0,lucro:0};
  
  for(var fi=0;fi<years.length;fi++){
    var yr=years[fi];
    addLog('\n['+yr+'] Processando...','warn');
    
    try{
      var projs=await parseXLSX(yr);
      
      var totV=projs.reduce(function(s,p){return s+p.value;},0);
      var totC=projs.reduce(function(s,p){return s+p.cost;},0);
      var totP=projs.reduce(function(s,p){return s+p.profit;},0);
      var avgM=projs.length?parseFloat((projs.reduce(function(s,p){return s+p.margin;},0)/projs.length).toFixed(1)):0;
      
      addLog('['+yr+'] Projetos: '+projs.length,'ok');
      addLog('['+yr+'] Faturamento: R$ '+Math.round(totV).toLocaleString('pt-BR'),'ok');
      addLog('['+yr+'] Custo:       R$ '+Math.round(totC).toLocaleString('pt-BR'),'ok');
      addLog('['+yr+'] Lucro:       R$ '+Math.round(totP).toLocaleString('pt-BR'),'ok');
      addLog('['+yr+'] Margem avg:  '+avgM+'%','ok');
      
      // Show first 3 projects as validation
      for(var pi=0;pi<Math.min(3,projs.length);pi++){
        var p=projs[pi];
        addLog('  '+p.client+' | '+p.project_name+' | R$'+p.value.toLocaleString('pt-BR')+' | custo:R$'+p.cost.toLocaleString('pt-BR')+' | lucro:R$'+p.profit.toLocaleString('pt-BR')+' | margem:'+p.margin+'%','');
      }
      
      addLog('['+yr+'] Inserindo no banco...','warn');
      var inserted=await insertBatch('age_hist_projects', projs);
      addLog('['+yr+'] ã Inseridos: '+inserted+'/'+projs.length,'ok');
      
      grandTotal.projs+=projs.length;
      grandTotal.fat+=totV;
      grandTotal.custo+=totC;
      grandTotal.lucro+=totP;
      
    }catch(e){
      addLog('['+yr+'] ã ERRO: '+e.message,'err');
    }
  }
  
  addLog('\n=== RESUMO GERAL ===','warn');
  addLog('Total de projetos: '+grandTotal.projs,'ok');
  addLog('Faturamento total: R$ '+Math.round(grandTotal.fat).toLocaleString('pt-BR'),'ok');
  addLog('Custo total:       R$ '+Math.round(grandTotal.custo).toLocaleString('pt-BR'),'ok');
  addLog('Lucro total:       R$ '+Math.round(grandTotal.lucro).toLocaleString('pt-BR'),'ok');
  addLog('\nã IMPORTAûûO CONCLUûDA!','ok');
}
</script>
</body>
