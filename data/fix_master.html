function validateData() {
  var byYear = {};
  PROJECTS_DATA.forEach(p => {
    if(!byYear[p.year]) byYear[p.year]={n:0,fat:0,cost:0,lucro:0};
    byYear[p.year].n++;
    byYear[p.year].fat   += p.value;
    byYear[p.year].cost  += p.cost;
    byYear[p.year].lucro += p.profit;
  });
  var expected = {
    2021:{n:12,fat:67415,cost:0,lucro:67415},
    2022:{n:25,fat:109042,cost:58835,lucro:50207},
    2023:{n:28,fat:210591,cost:97431,lucro:113160},
    2024:{n:22,fat:162440,cost:77538,lucro:84902},
    2025:{n:23,fat:110190,cost:0,lucro:110190},
    2026:{n:12,fat:46200,cost:19979,lucro:26221}
  };
  var ok = true;
  Object.entries(expected).forEach(([yr,exp]) => {
    var got = byYear[yr] || {n:0,fat:0,cost:0,lucro:0};
    var match = (got.n===exp.n);
    var fatDiff = Math.abs(got.fat - exp.fat);
    L(`[${yr}] Proj: ${got.n}/${exp.n} | Fat: R$${Math.round(got.fat).toLocaleString('pt-BR')} (exp R$${exp.fat.toLocaleString('pt-BR')}, diff ${fatDiff>10?'⚠ '+fatDiff:'✓'}) | Custo: R$${Math.round(got.cost).toLocaleString('pt-BR')}`, match&&fatDiff<=50?'ok':'warn');
    if (!match || fatDiff > 100) ok = false;
  });
  L(`\nTotal: ${PROJECTS_DATA.length} projetos (esperado: 122)`, PROJECTS_DATA.length===122?'ok':'warn');
  return ok;
}

/* ── Limpar tabela (paginado) ── */
async function clearTable(tbl) {
  L(`[DB] Limpando ${tbl}...`, 'warn');
  var total = 0, page = 1, hasMore = true;
  while (hasMore) {
    var r = await fetch(`../tables/${tbl}?page=${page}&limit=100`);
    var d = await r.json();
    var items = (d.data||[]).filter(i=>!i.deleted);
    if (!items.length) { if((d.data||[]).length<100) hasMore=false; else page++; continue; }
    await Promise.all(items.map(item=>fetch(`../tables/${tbl}/${item.id}`,{method:'DELETE'}).then(()=>total++)));
    L(`  Deletados: ${total}...`, 'dim');
    if ((d.data||[]).length < 100) hasMore=false; else page++;
  }
  L(`[DB] ✓ ${tbl} limpa: ${total} registros removidos`, 'ok');
  return total;
}

    var batch = rows.slice(i,i+5);
    await Promise.all(batch.map(row=>
      fetch(`../tables/${tbl}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(row)})
        .then(r=>{ if(r.ok) ok++; else err++; })
        .catch(()=>err++)
    ));
    if ((i+5)%50===0||i+5>=rows.length)
      L(`  → ${Math.min(i+5,rows.length)}/${rows.length} (ok:${ok} err:${err})`, err?'err':'dim');
  }
  return {ok,err};
}

/* ── Reconstruir age_clients_db ── */
async function rebuildClients(allProjs) {
  L('\n[CLIENTS] Reconstruindo age_clients_db...', 'info');
  await clearTable('age_clients_db');

  var cliMap = {};
  allProjs.forEach(p => {
    var n = p.client_name||'?';
    if(!cliMap[n]) cliMap[n]=[];
    cliMap[n].push(p);
  });

  var rows = [];
  Object.entries(cliMap).forEach(([name, projs]) => {
    var totVal  = projs.reduce((s,p)=>s+(p.value||0),0);
    var withNps = projs.filter(p=>p.nps>0);
    var avgNps  = withNps.length ? withNps.reduce((s,p)=>s+p.nps,0)/withNps.length : 0;
    var years   = [...new Set(projs.map(p=>p.year))].sort();
    var firstY  = years[0], lastY = years[years.length-1];
    var curYear = new Date().getFullYear();
    // status: ativo = teve projeto no ano atual; recorrente = teve no ano passado; inativo = mais antigo
    var status = lastY >= curYear ? 'ativo' : lastY >= curYear-1 ? 'recorrente' : 'inativo';
    rows.push({
      client_name:    name,
      first_year:     firstY,
      last_year:      lastY,
      total_projects: projs.length,
      total_value:    Math.round(totVal*100)/100,
      avg_nps:        parseFloat(avgNps.toFixed(1)),
      status,
      notes:          '',
      years_active:   years.join(',')
    });
  });
  rows.sort((a,b)=>b.total_value-a.total_value);

  L(`[CLIENTS] ${rows.length} clientes únicos → inserindo...`, 'info');
  var res = await insertBatch('age_clients_db', rows);
  L(`[CLIENTS] ✓ ok:${res.ok} | err:${res.err}`, res.err?'err':'ok');

  L('\n[CLIENTS] Top 15 por faturamento:','head');
  rows.slice(0,15).forEach((c,i) => {
    L(`  ${String(i+1).padStart(2)}. ${c.client_name.padEnd(22)} ${c.total_projects}p | R$${Math.round(c.total_value).toLocaleString('pt-BR').padStart(9)} | ${c.status} | anos: ${c.years_active}`, 'ok');
  });
  return rows;
}

/* ── FULL RUN ── */
async function runFull() {
  logEl.innerHTML='';
  L('=== 🚀 RE-IMPORT COMPLETO — '+ new Date().toLocaleTimeString('pt-BR') + ' ===','ok');

  L('\n[FASE 0] Validando dados internos...','info');
  validateData();

  try {
    L('\n[FASE 1] Limpando age_hist_projects...','warn');
    await clearTable('age_hist_projects');

    L('\n[FASE 2] Inserindo 122 projetos...','info');
    var res = await insertBatch('age_hist_projects', PROJECTS_DATA);
    L(`\n✓ Inseridos: ${res.ok} | Erros: ${res.err}`, res.err?'err':'ok');

    L('\n[FASE 3] Verificação rápida...','info');
    var chk = await fetch('../tables/age_hist_projects?limit=10&page=1');
    var chkD = await chk.json();
    L(`  Total no banco: ${chkD.total||'?'}`, 'ok');

    L('\n[FASE 4] Reconstruindo clientes...','info');
    await rebuildClients(PROJECTS_DATA);

    L('\n=== ✅ CONCLUÍDO ===','ok');
    printSummary();
  } catch(e) {
    L('ERRO FATAL: '+e.message,'err');
    console.error(e);
  }
}

function printSummary() {
  var byYear={};
  PROJECTS_DATA.forEach(p=>{ if(!byYear[p.year]) byYear[p.year]={n:0,fat:0}; byYear[p.year].n++; byYear[p.year].fat+=p.value; });
  L('\n── RESUMO POR ANO ──','head');
  Object.keys(byYear).sort().forEach(yr=>{
    L(`  ${yr}: ${byYear[yr].n} projetos | R$${Math.round(byYear[yr].fat).toLocaleString('pt-BR')}`, 'ok');
  });
  var tot = PROJECTS_DATA.reduce((s,p)=>s+p.value,0);
  var clientes = [...new Set(PROJECTS_DATA.map(p=>p.client_name))].length;
  L(`\nTOTAL: ${PROJECTS_DATA.length} projetos | ${clientes} clientes únicos | R$${Math.round(tot).toLocaleString('pt-BR')}`, 'ok');
}

async function runDiagOnly() {
  logEl.innerHTML='';
  L('=== 🔍 DIAGNÓSTICO (sem alterar DB) ===','info');
  validateData();
  printSummary();

  L('\n[DB] Verificando banco atual...','info');
  try {
    var r = await fetch('../tables/age_hist_projects?limit=500');
    var d = await r.json();
    var rows = (d.data||[]).filter(p=>!p.deleted);
    L(`  age_hist_projects: ${rows.length} registros (total paginado: ${d.total||'?'})`, rows.length===122?'ok':'warn');
    var byYr={};
    rows.forEach(p=>{ byYr[p.year]=(byYr[p.year]||0)+1; });
    Object.keys(byYr).sort().forEach(yr=>{ L(`    ${yr}: ${byYr[yr]} proj`,'dim'); });

    var rc = await fetch('../tables/age_clients_db?limit=300');
    var dc = await rc.json();
    var cli = (dc.data||[]).filter(c=>!c.deleted);
    L(`  age_clients_db: ${cli.length} clientes`, 'ok');
    cli.slice(0,5).forEach(c=>{
      L(`    ${c.client_name}: ${c.total_projects}p | R$${Math.round(c.total_value||0).toLocaleString('pt-BR')}`, 'dim');
    });
  } catch(e) { L('Erro ao consultar DB: '+e.message,'err'); }
}

async function clearAll() {
  if (!confirm('Limpar age_hist_projects e age_clients_db? Isso não pode ser desfeito.')) return;
  logEl.innerHTML='';
  await clearTable('age_hist_projects');
  await clearTable('age_clients_db');
  L('Tabelas limpas. Execute o re-import completo agora.','warn');
}

async function rebuildClientsOnly() {
  logEl.innerHTML='';
  L('=== 👥 Reconstruindo apenas age_clients_db ===','info');
  try {
    await rebuildClients(PROJECTS_DATA);
    L('\n✅ Clientes reconstruídos!','ok');
  } catch(e) { L('Erro: '+e.message,'err'); }
}
