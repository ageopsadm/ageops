<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>extract2026</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="o" style="font-family:monospace;font-size:11px;white-space:pre;background:#000;color:#0f0;padding:14px;"></div>
<script>
function p(t){ 
  document.getElementById('o').textContent += t + '\n'; 
  console.log(t);
}
function getNum(rN,rS,i){
  if(i<0)return 0;
  var nv=rN[i];
  if(typeof nv==='number'&&!isNaN(nv))return nv;
  var sv=(rS[i]||'').toString().trim().replace(/R\$\s*/gi,'').replace(/\s+/g,'');
  if(/^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(sv))sv=sv.replace(/,/g,'');
  else if(/^-?\d{1,3}(\.\d{3})*(,\d+)?$/.test(sv))sv=sv.replace(/\./g,'').replace(',','.');
  else sv=sv.replace(/[^\d.\-]/g,'');
  var n=parseFloat(sv);return isNaN(n)?0:n;
}
function fmtD(raw){
  if(!raw)return'';
  if(raw instanceof Date){var y=raw.getUTCFullYear(),m=raw.getUTCMonth()+1,d=raw.getUTCDate();if(y>1900)return y+'-'+('0'+m).slice(-2)+'-'+('0'+d).slice(-2);}
  var s=raw.toString().trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  var mo={jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12,feb:2,apr:4,may:5,aug:8,sep:9,oct:10,dec:12};
  var mx=s.match(/(\d{1,2})[-\/\s]([a-zA-Z]{3})[-\/\s](\d{4})/);
  if(mx&&mo[mx[2].toLowerCase()])return mx[3]+'-'+('0'+mo[mx[2].toLowerCase()]).slice(-2)+'-'+('0'+mx[1]).slice(-2);
  if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(s)){var pts=s.split(/[\/\-]/);return pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');}
  return'';
}
window.onload = async function(){
  try{
    p('>> Fetching 2026.xlsx...');
    var r = await fetch('2026.xlsx');
    p('>> Status: '+r.status);
    var buf = await r.arrayBuffer();
    p('>> Buf size: '+buf.byteLength);
    var wb = XLSX.read(buf,{type:'array',cellDates:true});
    p('>> Sheets: '+wb.SheetNames.join(', '));
    var ws = wb.Sheets[wb.SheetNames[0]];
    var S = XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    var N = XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    p('>> Total rows: '+S.length);
    // Raw first 8
    for(var i=0;i<Math.min(8,S.length);i++) p('ROW['+i+']: '+JSON.stringify(S[i]));
    // Find header
    var hr=0;
    for(var i=0;i<Math.min(10,S.length);i++){if((S[i]||[]).join(' ').toLowerCase().indexOf('cliente')>=0){hr=i;break;}}
    var hdr=(S[hr]||[]).map(function(h){return(h||'').trim();});
    p('\nHEADER['+hr+']: '+JSON.stringify(hdr));
    // map cols
    var ci={cl:-1,pj:-1,sd:-1,pd:-1,mn:-1,nc:-1,vl:-1,ct:-1,pr:-1,mg:-1,np:-1,cat:-1,seg:-1};
    hdr.forEach(function(h,i){
      var l=h.toLowerCase();
      if(/^(cliente)$/.test(l)&&ci.cl<0)ci.cl=i;
      if(/^projeto/.test(l)&&ci.pj<0)ci.pj=i;
      if(/data.*venda|venda.*data/.test(l))ci.sd=i;
      if(/data.*pag|pag.*data/.test(l))ci.pd=i;
      if(/^m[eê]s$/.test(l))ci.mn=i;
      if(/cliente.*novo/.test(l)&&ci.nc<0)ci.nc=i;
      if(/^nps$/.test(l))ci.np=i;
      if(/categ/.test(l)&&ci.cat<0)ci.cat=i;
      if(/segmen/.test(l)&&ci.seg<0)ci.seg=i;
      if(/^faturamento$|^or[cç]amento$|^receita$|^valor$/.test(l)&&ci.vl<0)ci.vl=i;
      if(/valor.*total/i.test(l)&&ci.vl<0)ci.vl=i;
      if(/^(custos?|despesas?|gastos?)$/.test(l)&&ci.ct<0)ci.ct=i;
      if(/custo.*(prod|total|real)/i.test(l)&&ci.ct<0)ci.ct=i;
      if(/^lucro$/.test(l)&&ci.pr<0)ci.pr=i;
      if(/^(margem|margin)$/.test(l)&&ci.mg<0)ci.mg=i;
    });
    p('COLS: '+JSON.stringify(ci));
    // Extract rows
    var projs=[]; var totV=0, totC=0;
    for(var ri=hr+1;ri<S.length;ri++){
      var rS=S[ri]||[],rN=N[ri]||[];
      if(rS.every(function(c){return!c||String(c).trim()===''}))continue;
      var cl=ci.cl>=0?(rS[ci.cl]||'').trim():'';
      var pj=ci.pj>=0?(rS[ci.pj]||'').trim():'';
      if(!cl&&!pj)continue;
      if(/^(total|soma|media)/i.test(cl))continue;
      var vl=getNum(rN,rS,ci.vl);
      var ct=getNum(rN,rS,ci.ct);
      var pr=getNum(rN,rS,ci.pr);
      var mg=getNum(rN,rS,ci.mg);
      var np=getNum(rN,rS,ci.np);
      if(mg>0&&mg<=1.5)mg=parseFloat((mg*100).toFixed(1));
      if(vl>0&&pr===0)pr=parseFloat((vl-ct).toFixed(2));
      if(vl>0&&pr!==0&&mg===0)mg=parseFloat(((pr/vl)*100).toFixed(1));
      var pd=fmtD(ci.pd>=0?(rN[ci.pd]||rS[ci.pd]||''):'');
      var sd=fmtD(ci.sd>=0?(rN[ci.sd]||rS[ci.sd]||''):'');
      var mn=ci.mn>=0?(parseInt(rN[ci.mn])||0):0;
      if(!mn&&pd&&pd.length>=7)mn=parseInt(pd.substring(5,7));
      if(!mn&&sd&&sd.length>=7)mn=parseInt(sd.substring(5,7));
      var nc=ci.nc>=0?(rS[ci.nc]||'').trim():'';
      var cat=ci.cat>=0?(rS[ci.cat]||'').trim():'';
      var seg=ci.seg>=0?(rS[ci.seg]||'').trim():'';
      totV+=vl; totC+=ct;
      p('PROJ['+(projs.length+1)+']: cli="'+cl+'" proj="'+pj+'" mes='+mn+' sd='+sd+' pd='+pd+' val='+vl+' cost='+ct+' profit='+pr.toFixed(0)+' mg='+mg.toFixed(1)+'% nps='+np+' seg="'+seg+'" cat="'+cat+'" new="'+nc+'"');
      projs.push({year:2026,month:mn,client_name:cl,project_name:pj,sale_date:sd,payment_date:pd,is_new_client:/^(sim|yes|true|1)$/i.test(nc),value:Math.round(vl*100)/100,cost:Math.round(ct*100)/100,profit:Math.round(pr*100)/100,margin_pct:parseFloat(mg.toFixed(1)),nps:(np>10||np<0)?0:np,category:cat||'producao',segment:seg||'',status:'concluido'});
    }
    p('\n>> TOTAL: '+projs.length+' projs | Fat=R$'+Math.round(totV).toLocaleString('pt-BR')+' | Custo=R$'+Math.round(totC).toLocaleString('pt-BR'));
    p('\n>> JSON:\n'+JSON.stringify(projs,null,2));
  }catch(e){p('ERRO: '+e.message);console.error(e);}
};
</script>
</body>
</html>
